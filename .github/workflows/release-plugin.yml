```yaml
name: Plugin Release

on:
  push:
    tags:
      - '*-v*'

jobs:
  release:
    name: Release Plugin
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    env:
      CI: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Setup Composer
        uses: ramsey/composer-install@v3

      - name: Get PNPM Store Path
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache PNPM Store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract Plugin Information
        id: plugin
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          PLUGIN="${TAG%-v*}"
          VERSION="${TAG##*-v}"

          echo "plugin=$PLUGIN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "Plugin: $PLUGIN"
          echo "Version: $VERSION"

      - name: Validate Plugin Exists
        shell: bash
        run: |
          if [ ! -d "plugins/${{ steps.plugin.outputs.plugin }}" ]; then
            echo "Plugin directory not found"
            exit 1
          fi

      - name: Validate Version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./plugins/${{ steps.plugin.outputs.plugin }}/package.json').version")

          if [ "$PACKAGE_VERSION" != "${{ steps.plugin.outputs.version }}" ]; then
            echo "Tag version does not match package.json version"
            echo "Tag version: ${{ steps.plugin.outputs.version }}"
            echo "Package version: $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build Plugin ZIP
        working-directory: plugins/${{ steps.plugin.outputs.plugin }}
        run: pnpm run build:zip

      - name: Verify ZIP Exists
        shell: bash
        run: |
          ZIP_FILE=$(find plugins/${{ steps.plugin.outputs.plugin }}/release -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "Release ZIP not found"
            exit 1
          fi

          echo "ZIP found: $ZIP_FILE"

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.plugin.outputs.plugin }} v${{ steps.plugin.outputs.version }}
          generate_release_notes: true
          files: |
            plugins/${{ steps.plugin.outputs.plugin }}/release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
