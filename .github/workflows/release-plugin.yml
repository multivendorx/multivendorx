name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin slug"
        required: true
        default: "moowoodle"

permissions:
  contents: write

env:
  PNPM_CONFIG_FROZEN_LOCKFILE: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0

      - name: Verify PNPM
        run: pnpm --version

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install Dependencies
        run: pnpm install

      - name: Build Zyra Package
        run: |
          pnpm --filter zyra run build

      - name: Verify Plugin Exists
        run: |
          if [ ! -d "plugins/${{ github.event.inputs.plugin }}" ]; then
            echo "Plugin does not exist"
            exit 1
          fi

      - name: Build Plugin ZIP
        run: |
          pnpm --filter "${{ github.event.inputs.plugin }}" run build:zip

      - name: Verify ZIP Exists
        run: |
          ls -lah plugins/${{ github.event.inputs.plugin }}/release

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: plugins/${{ github.event.inputs.plugin }}/release/*.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./plugins/${{ github.event.inputs.plugin }}/package.json').version")
          TAG="${{ github.event.inputs.plugin }}-v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
            exit 0
          fi

          gh release create \
            "$TAG" \
            plugins/${{ github.event.inputs.plugin }}/release/*.zip \
            --title "${{ github.event.inputs.plugin }} v${VERSION}" \
            --generate-notes
