name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin slug (multivendorx, moowoodle, catalogx, notifima etc.)"
        required: true
        default: "multivendorx"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Node + PNPM (CLEAN & CONSISTENT)
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"
          cache: "pnpm"

      - name: Enable Corepack + PNPM
        run: |
          corepack enable
          corepack prepare pnpm@10.34.1 --activate

          node -v
          pnpm -v

      # -------------------------
      # PHP (safe install for WP tooling)
      # -------------------------
      - name: Setup PHP
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update
          sudo apt-get install -y php8.4 php8.4-cli php8.4-mbstring php8.4-xml php8.4-curl unzip curl

          php -v

      # -------------------------
      # WP-CLI (for i18n only)
      # -------------------------
      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

          wp --info

      # -------------------------
      # Install dependencies (ROOT ONLY)
      # -------------------------
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      # -------------------------
      # Build shared package (ZYRA)
      # -------------------------
      - name: Build Zyra
        run: pnpm --filter zyra run build

      # -------------------------
      # Validate plugin folder
      # -------------------------
      - name: Validate Plugin
        run: |
          if [ ! -d "plugins/${{ github.event.inputs.plugin }}" ]; then
            echo "Plugin not found"
            exit 1
          fi

      # -------------------------
      # Build ONLY selected plugin
      # -------------------------
      - name: Build Plugin
        run: |
          cd plugins/${{ github.event.inputs.plugin }}
          pnpm run build:zip

      # -------------------------
      # Verify build output
      # -------------------------
      - name: Verify Output
        run: |
          ls -lah plugins/${{ github.event.inputs.plugin }}/release

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: plugins/${{ github.event.inputs.plugin }}/release/*.zip

      # -------------------------
      # Create GitHub Release
      # -------------------------
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd plugins/${{ github.event.inputs.plugin }}

          VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.inputs.plugin }}-v${VERSION}"

          cd ../..

          gh release create \
            "$TAG" \
            plugins/${{ github.event.inputs.plugin }}/release/*.zip \
            --title "${{ github.event.inputs.plugin }} v${VERSION}" \
            --notes "Automated release for ${TAG}"
