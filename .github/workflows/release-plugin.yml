name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin slug (multivendorx, moowoodle, catalogx, notifima etc.)"
        required: true
        default: "multivendorx"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Node + PNPM
      # -------------------------
      - name: Setup Node + PNPM
        run: |
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
          sudo apt-get install -y nodejs

          corepack enable || true
          corepack prepare pnpm@11.4.0 --activate || true

          node -v
          pnpm -v

      # -------------------------
      # PHP (manual, policy-safe)
      # -------------------------
      - name: Setup PHP
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update
          sudo apt-get install -y php8.4 php8.4-cli php8.4-mbstring php8.4-xml php8.4-curl unzip curl
          php -v

      # -------------------------
      # WP-CLI (needed for i18n only)
      # -------------------------
      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          php wp-cli.phar --info
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

          wp --info

      # -------------------------
      # Install deps (clean CI mode)
      # -------------------------
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      # -------------------------
      # Build shared package
      # -------------------------
      - name: Build Zyra
        run: pnpm --filter zyra run build

      # -------------------------
      # Validate plugin exists
      # -------------------------
      - name: Validate Plugin
        run: |
          if [ ! -d "plugins/${{ github.event.inputs.plugin }}" ]; then
            echo "Plugin not found"
            exit 1
          fi

      # -------------------------
      # Build plugin (NO recursion, NO workspace build)
      # -------------------------
      - name: Build Plugin
        run: |
          cd plugins/${{ github.event.inputs.plugin }}
          pnpm run build:zip

      # -------------------------
      # Verify output
      # -------------------------
      - name: Verify Build
        run: |
          ls -lah plugins/${{ github.event.inputs.plugin }}/release

      # -------------------------
      # Upload artifact (actions allowed)
      # -------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: plugins/${{ github.event.inputs.plugin }}/release/*.zip

      # -------------------------
      # GitHub Release (clean notes only)
      # -------------------------
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./plugins/${{ github.event.inputs.plugin }}/package.json').version")
          TAG="${{ github.event.inputs.plugin }}-v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists"
            exit 0
          fi

          gh release create \
            "$TAG" \
            plugins/${{ github.event.inputs.plugin }}/release/*.zip \
            --title "${{ github.event.inputs.plugin }} v${VERSION}" \
            --notes "${{ github.event.inputs.plugin }} version ${VERSION} release"
