name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin slug (multivendorx, moowoodle, catalogx, notifima etc.)"
        required: true
        default: "multivendorx"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "24.16.0"
      PNPM_VERSION: "10.34.1"

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Node + PNPM (STRICT VERSION MATCH)
      # -------------------------
      - name: Setup Node + PNPM
        run: |
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
          sudo apt-get install -y nodejs

          node -v

          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

          pnpm -v

      # -------------------------
      # PHP (kept manual, CI-safe)
      # -------------------------
      - name: Setup PHP
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update
          sudo apt-get install -y php8.4 php8.4-cli php8.4-mbstring php8.4-xml php8.4-curl unzip curl
          php -v

      # -------------------------
      # WP-CLI (only for i18n)
      # -------------------------
      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

          wp --info

      # -------------------------
      # Install dependencies (IMPORTANT FIX)
      # -------------------------
      - name: Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile --ignore-scripts

      # -------------------------
      # Build shared package (ZYRA SAFE)
      # -------------------------
      - name: Build Zyra
        run: |
          pnpm --filter zyra run build

      # -------------------------
      # Validate plugin
      # -------------------------
      - name: Validate Plugin
        run: |
          if [ ! -d "plugins/${{ github.event.inputs.plugin }}" ]; then
            echo "Plugin not found"
            exit 1
          fi

      # -------------------------
      # Build plugin ONLY (no workspace recursion)
      # -------------------------
      - name: Build Plugin
        run: |
          cd plugins/${{ github.event.inputs.plugin }}
          pnpm run build:zip

      # -------------------------
      # Verify output
      # -------------------------
      - name: Verify Build Output
        run: |
          ls -lah plugins/${{ github.event.inputs.plugin }}/release

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: plugins/${{ github.event.inputs.plugin }}/release/*.zip

      # -------------------------
      # Release
      # -------------------------
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd plugins/${{ github.event.inputs.plugin }}

          VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.inputs.plugin }}-v${VERSION}"

          cd ../..

          gh release create \
            "$TAG" \
            plugins/${{ github.event.inputs.plugin }}/release/*.zip \
            --title "${{ github.event.inputs.plugin }} v${VERSION}" \
            --notes "Automated release for ${TAG}"
