name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Select plugin"
        required: true
        type: choice
        default: multivendorx
        options:
          - multivendorx
          - moowoodle
          - catalogx
          - other

      custom_plugin:
        description: "Plugin slug (only when plugin=other)"
        required: false
        default: ""

      action:
        description: "Release action"
        required: true
        type: choice
        default: GitHub Release
        options:
          - GitHub Release
          - WordPress.org Release
          - Both

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.event.inputs.plugin }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      plugin_slug: ${{ steps.plugin.outputs.slug }}
      version: ${{ steps.meta.outputs.version }}
      wporg_slug: ${{ steps.meta.outputs.wporg_slug }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve Plugin Slug
        id: plugin
        shell: bash
        run: |
          if [ "${{ github.event.inputs.plugin }}" = "other" ]; then
            PLUGIN="${{ github.event.inputs.custom_plugin }}"
          else
            PLUGIN="${{ github.event.inputs.plugin }}"
          fi

          if [ -z "$PLUGIN" ]; then
            echo "Plugin slug is required"
            exit 1
          fi

          if [ ! -d "plugins/$PLUGIN" ]; then
            echo "Plugin folder not found: plugins/$PLUGIN"
            exit 1
          fi

          echo "slug=$PLUGIN" >> "$GITHUB_OUTPUT"

  release:
    needs: build
    if: github.event.inputs.action == 'GitHub Release' || github.event.inputs.action == 'Both'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: plugin-zip-${{ needs.build.outputs.plugin_slug }}
          path: release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          PLUGIN="${{ needs.build.outputs.plugin_slug }}"

          ZIP_FILE=$(find release -name "*.zip" | head -n 1)

          TAG="${PLUGIN}-v${VERSION}"

          gh release create \
            "$TAG" \
            "$ZIP_FILE" \
            --title "${PLUGIN} v${VERSION}" \
            --notes "${PLUGIN} version ${VERSION} release"

  wporg:
    needs: build
    if: github.event.inputs.action == 'WordPress.org Release' || github.event.inputs.action == 'Both'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: plugin-zip-${{ needs.build.outputs.plugin_slug }}
          path: release
