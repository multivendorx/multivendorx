name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin slug (e.g. multivendorx, moowoodle)"
        required: true
        default: "multivendorx"

permissions:
  contents: write

env:
  PNPM_CONFIG_FROZEN_LOCKFILE: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0

      - name: Verify PNPM
        run: pnpm --version

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          php wp-cli.phar --info
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Verify WP-CLI
        run: wp --info

      - name: Install Dependencies (no scripts)
        run: pnpm install --ignore-scripts

      - name: Build Zyra (shared package)
        run: pnpm --filter zyra run build

      - name: Validate Plugin Path
        run: |
          if [ ! -d "plugins/${{ github.event.inputs.plugin }}" ]; then
            echo "Plugin not found: plugins/${{ github.event.inputs.plugin }}"
            exit 1
          fi

      - name: Build Plugin (NO MONOREPO RECURSION)
        run: |
          cd plugins/${{ github.event.inputs.plugin }}
          pnpm run build:zip

      - name: Verify Build Output
        run: |
          ls -lah plugins/${{ github.event.inputs.plugin }}/release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: plugins/${{ github.event.inputs.plugin }}/release/*.zip

      - name: Create GitHub Release (clean notes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./plugins/${{ github.event.inputs.plugin }}/package.json').version")
          TAG="${{ github.event.inputs.plugin }}-v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
            exit 0
          fi

          gh release create \
            "$TAG" \
            plugins/${{ github.event.inputs.plugin }}/release/*.zip \
            --title "${{ github.event.inputs.plugin }} v${VERSION}" \
            --notes "${{ github.event.inputs.plugin }} version ${VERSION} release"
