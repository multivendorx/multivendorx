      - name: Enable Corepack + PNPM (FIXED)
        shell: bash
        run: |
          set -e

          corepack enable

          # Force pnpm activation explicitly
          corepack prepare pnpm@10.34.1 --activate

          # Ensure PATH includes corepack shims
          export PATH="$(corepack root)/shims:$PATH"

          echo "Node:"
          node -v

          echo "PNPM:"
          which pnpm || true
          pnpm -v      # -------------------------
      # Enable Corepack + PNPM (FIX for pnpm not found)
      # -------------------------
      - name: Enable Corepack + PNPM
        run: |
          corepack enable
          corepack prepare pnpm@10.34.1 --activate

          node -v
          pnpm -v

      # -------------------------
      # PHP (manual install - policy safe)
      # -------------------------
      - name: Setup PHP
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update
          sudo apt-get install -y php8.4 php8.4-cli php8.4-mbstring php8.4-xml php8.4-curl unzip curl
          php -v

      # -------------------------
      # Install WP-CLI
      # -------------------------
      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          wp --info

      # -------------------------
      # Install dependencies (CI-safe)
      # -------------------------
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # -------------------------
      # Build Zyra FIRST (fix shared dependency errors)
      # -------------------------
      - name: Build Zyra Package
        run: pnpm --filter zyra run build

      # -------------------------
      # Validate plugin exists
      # -------------------------
      - name: Validate Plugin
        run: |
          if [ ! -d "plugins/${{ github.event.inputs.plugin }}" ]; then
            echo "Plugin not found"
            exit 1
          fi

      # -------------------------
      # Build ONLY selected plugin (NO workspace recursion)
      # -------------------------
      - name: Build Plugin
        run: |
          cd plugins/${{ github.event.inputs.plugin }}

          pnpm install --no-frozen-lockfile

          pnpm run readme
          pnpm run build:project
          pnpm run makepot
          pnpm run makejson
          pnpm run release

      # -------------------------
      # Verify release output
      # -------------------------
      - name: Verify Build Output
        run: |
          ls -lah plugins/${{ github.event.inputs.plugin }}/release || true

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-release
          path: plugins/${{ github.event.inputs.plugin }}/release/*.zip

      # -------------------------
      # Create GitHub Release
      # -------------------------
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./plugins/${{ github.event.inputs.plugin }}/package.json').version")
          TAG="${{ github.event.inputs.plugin }}-v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists"
            exit 0
          fi

          gh release create \
            "$TAG" \
            plugins/${{ github.event.inputs.plugin }}/release/*.zip \
            --title "${{ github.event.inputs.plugin }} v${VERSION}" \
            --notes "${{ github.event.inputs.plugin }} ${VERSION} release"
