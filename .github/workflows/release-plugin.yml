name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin slug (multivendorx, moowoodle, catalogx, notifima etc.)"
        required: true
        default: "multivendorx"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Setup Node (policy compliant)
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"
          cache: "npm"

      # -------------------------
      # Install PNPM globally (FIX: removes all pnpm/path issues)
      # -------------------------
      - name: Install PNPM
        run: npm install -g pnpm@10.34.1

      # -------------------------
      # Verify environment
      # -------------------------
      - name: Verify Node & PNPM
        run: |
          node -v
          pnpm -v

      # -------------------------
      # PHP setup (manual, no external actions)
      # -------------------------
      - name: Setup PHP
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update
          sudo apt-get install -y php8.4 php8.4-cli php8.4-mbstring php8.4-xml php8.4-curl unzip curl
          php -v

      # -------------------------
      # Install WP-CLI
      # -------------------------
      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          wp --info

      # -------------------------
      # Install dependencies (safe for CI)
      # -------------------------
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # -------------------------
      # Build Zyra first (fix shared dependency build)
      # -------------------------
      - name: Build Zyra Package
        run: pnpm --filter zyra run build

      # -------------------------
      # Validate plugin exists
      # -------------------------
      - name: Validate Plugin
        run: |
          if [ ! -d "plugins/${{ github.event.inputs.plugin }}" ]; then
            echo "Plugin not found"
            exit 1
          fi

      # -------------------------
      # Build selected plugin ONLY (NO monorepo recursion)
      # -------------------------
      - name: Build Plugin
        run: |
          cd plugins/${{ github.event.inputs.plugin }}

          pnpm install --no-frozen-lockfile

          pnpm run readme
          pnpm run build:project
          pnpm run makepot
          pnpm run makejson
          pnpm run release

      # -------------------------
      # Verify output
      # -------------------------
      - name: Verify Build Output
        run: |
          ls -lah plugins/${{ github.event.inputs.plugin }}/release || true

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-release
          path: plugins/${{ github.event.inputs.plugin }}/release/*.zip

      # -------------------------
      # Create GitHub Release
      # -------------------------
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./plugins/${{ github.event.inputs.plugin }}/package.json').version")
          TAG="${{ github.event.inputs.plugin }}-v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists"
            exit 0
          fi

          gh release create \
            "$TAG" \
            plugins/${{ github.event.inputs.plugin }}/release/*.zip \
            --title "${{ github.event.inputs.plugin }} v${VERSION}" \
            --notes "${{ github.event.inputs.plugin }} ${VERSION} release"
