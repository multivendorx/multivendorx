name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin slug (multivendorx, moowoodle, catalogx, notifima etc.)"
        required: true
        default: "multivendorx"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_ENV: production

    steps:
      # -----------------------------------
      # Checkout
      # -----------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------
      # Read Node + PNPM versions
      # -----------------------------------
      - name: Read Runtime Versions
        id: versions
        shell: bash
        run: |
          NODE_VERSION=$(node -p "require('./package.json').engines.node.replace(/[\^\~>=< ]/g, '')")
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1]")

          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "pnpm_version=$PNPM_VERSION" >> $GITHUB_OUTPUT

          echo "Node Version: $NODE_VERSION"
          echo "PNPM Version: $PNPM_VERSION"

      # -----------------------------------
      # Setup Node.js
      # -----------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node_version }}

      # -----------------------------------
      # Setup PNPM
      # -----------------------------------
      - name: Setup PNPM
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@${{ steps.versions.outputs.pnpm_version }} --activate

          echo "$(dirname $(which pnpm))" >> $GITHUB_PATH

          node -v
          pnpm -v
          which pnpm

      # -----------------------------------
      # Setup PHP
      # -----------------------------------
      - name: Setup PHP
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            php8.3 \
            php8.3-cli \
            php8.3-curl \
            php8.3-mbstring \
            php8.3-xml \
            unzip \
            curl

          php -v

      # -----------------------------------
      # Install WP-CLI
      # -----------------------------------
      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar

          chmod +x wp-cli.phar

          sudo mv wp-cli.phar /usr/local/bin/wp

          wp --info

      # -----------------------------------
      # Install dependencies
      # -----------------------------------
      - name: Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile --ignore-scripts

      # -----------------------------------
      # Build Zyra
      # -----------------------------------
      - name: Build Zyra
        run: |
          pnpm --filter zyra run build

      # -----------------------------------
      # Validate Plugin
      # -----------------------------------
      - name: Validate Plugin
        run: |
          if [ ! -d "plugins/${{ github.event.inputs.plugin }}" ]; then
            echo "Plugin not found: ${{ github.event.inputs.plugin }}"
            exit 1
          fi

      # -----------------------------------
      # Build Selected Plugin
      # -----------------------------------
      - name: Build Plugin
        run: |
          cd plugins/${{ github.event.inputs.plugin }}

          pnpm install --no-frozen-lockfile --ignore-scripts

          pnpm run build:zip

      # -----------------------------------
      # Verify Release
      # -----------------------------------
      - name: Verify Release
        run: |
          ls -lah plugins/${{ github.event.inputs.plugin }}/release

      # -----------------------------------
      # Upload Artifact
      # -----------------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.plugin }}-release
          path: plugins/${{ github.event.inputs.plugin }}/release/*.zip

      # -----------------------------------
      # Create GitHub Release
      # -----------------------------------
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./plugins/${{ github.event.inputs.plugin }}/package.json').version")

          TAG="${{ github.event.inputs.plugin }}-v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists"
            exit 0
          fi

          gh release create \
            "$TAG" \
            plugins/${{ github.event.inputs.plugin }}/release/*.zip \
            --title "${{ github.event.inputs.plugin }} v${VERSION}" \
            --notes "${{ github.event.inputs.plugin }} v${VERSION} release"
