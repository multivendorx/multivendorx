name: WordPress Deploy

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin slug"
        required: true
        default: "multivendorx"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------
      # Checkout
      # -----------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -----------------------------------
      # Read Runtime + WP.org versions dynamically
      # -----------------------------------
      - name: Read Runtime Versions
        id: versions
        shell: bash
        run: |
          ROOT_PACKAGE=./package.json
          PLUGIN_PACKAGE=./plugins/${{ github.event.inputs.plugin }}/package.json

          NODE_VERSION=$(node -p "
            const pkg=require('${ROOT_PACKAGE}');
            (
              pkg.engines?.node ||
              pkg.volta?.node ||
              '24'
            ).replace(/[^\d.]/g,'')
          ")

          PNPM_VERSION=$(node -p "
            const pkg=require('${ROOT_PACKAGE}');
            (
              pkg.packageManager?.match(/pnpm@(.*)/)?.[1] ||
              '10'
            )
          ")

          PLUGIN_VERSION=$(node -p "
            require('${PLUGIN_PACKAGE}').version
          ")

          WPORG_SLUG=$(node -p "
            const pkg=require('${PLUGIN_PACKAGE}');
            pkg.wordpressOrg?.slug ||
            pkg.wporg?.slug ||
            pkg.slug ||
            pkg.name
          ")

          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "pnpm_version=$PNPM_VERSION" >> $GITHUB_OUTPUT
          echo "plugin_version=$PLUGIN_VERSION" >> $GITHUB_OUTPUT
          echo "wporg_slug=$WPORG_SLUG" >> $GITHUB_OUTPUT

          echo "Detected Node: $NODE_VERSION"
          echo "Detected PNPM: $PNPM_VERSION"
          echo "Detected Plugin Version: $PLUGIN_VERSION"
          echo "Detected WP.org Slug: $WPORG_SLUG"

      # -----------------------------------
      # Setup Node
      # -----------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node_version }}

      # -----------------------------------
      # Setup PNPM
      # -----------------------------------
      - name: Setup PNPM
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@${{ steps.versions.outputs.pnpm_version }} --activate

          PNPM_PATH=$(dirname "$(which pnpm)")

          echo "$PNPM_PATH" >> $GITHUB_PATH

          export PATH="$PNPM_PATH:$PATH"

          hash -r

          pnpm -v
          node -v

      # -----------------------------------
      # Setup PHP
      # -----------------------------------
      - name: Setup PHP
        shell: bash
        run: |
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update

          sudo apt-get install -y \
            php8.4 \
            php8.4-cli \
            php8.4-mbstring \
            php8.4-xml \
            php8.4-curl \
            unzip \
            curl

          php -v

      # -----------------------------------
      # Install WP CLI
      # -----------------------------------
      - name: Install WP-CLI
        shell: bash
        run: |
          curl -L \
            https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar \
            -o wp-cli.phar

          chmod +x wp-cli.phar

          sudo mv wp-cli.phar /usr/local/bin/wp

          wp --info

      # -----------------------------------
      # Validate Plugin
      # -----------------------------------
      - name: Validate Plugin
        shell: bash
        run: |
          if [ ! -d "plugins/${{ github.event.inputs.plugin }}" ]; then
            echo "Plugin not found"
            exit 1
          fi

      # -----------------------------------
      # Install Dependencies
      # -----------------------------------
      - name: Install Dependencies
        shell: bash
        run: |
          pnpm install --no-frozen-lockfile

      # -----------------------------------
      # Install Missing Peer Dependencies
      # -----------------------------------
      - name: Install Missing Peer Dependencies
        shell: bash
        run: |
          pnpm add -Dw \
            sortablejs \
            react-sortablejs \
            react-multi-date-picker \
            react-drag-listview \
            @reactour/tour

      # -----------------------------------
      # Build Shared Packages
      # -----------------------------------
      - name: Build Zyra
        shell: bash
        run: |
          pnpm --filter zyra run build

      # -----------------------------------
      # Build Plugin
      # -----------------------------------
      - name: Build Plugin
        shell: bash
        run: |
          cd plugins/${{ github.event.inputs.plugin }}

          pnpm run build

      # -----------------------------------
      # Generate POT safely
      # -----------------------------------
      - name: Generate POT File
        shell: bash
        run: |
          cd plugins/${{ github.event.inputs.plugin }}

          wp i18n make-pot \
            . \
            languages/${{ github.event.inputs.plugin }}.pot \
            --domain='${{ github.event.inputs.plugin }}' \
            --include='assets/js,public,classes,templates,modules,config.php,dc_product_vendor.php' \
            --skip-js \
            --headers='{"Report-Msgid-Bugs-To":"https://multivendorx.com/contact/"}'

      # -----------------------------------
      # Create ZIP
      # -----------------------------------
      - name: Create ZIP
        shell: bash
        run: |
          cd plugins/${{ github.event.inputs.plugin }}

          pnpm run build:zip

      # -----------------------------------
      # Verify Release
      # -----------------------------------
      - name: Verify Build
        shell: bash
        run: |
          ls -lah plugins/${{ github.event.inputs.plugin }}/release

      # -----------------------------------
      # Upload Artifact
      # -----------------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: plugins/${{ github.event.inputs.plugin }}/release/*.zip

      # -----------------------------------
      # GitHub Release
      # -----------------------------------
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.versions.outputs.plugin_version }}"

          TAG="${{ github.event.inputs.plugin }}-v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists"
            exit 0
          fi

          gh release create \
            "$TAG" \
            plugins/${{ github.event.inputs.plugin }}/release/*.zip \
            --title "${{ github.event.inputs.plugin }} v${VERSION}" \
            --notes "${{ github.event.inputs.plugin }} version ${VERSION} release"

      # -----------------------------------
      # Install SVN
      # -----------------------------------
      - name: Install SVN
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion

      # -----------------------------------
      # Deploy to WordPress.org
      # -----------------------------------
      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: false
          plugin-dir: plugins/${{ github.event.inputs.plugin }}
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ steps.versions.outputs.wporg_slug }}
